<div class="search-section bg-white p-6 rounded-xl shadow-md max-w-4xl mx-auto my-8">
    <form action="/{{ page.lang }}/recherche/" method="get" class="flex flex-col md:flex-row gap-4">
        <input type="text" 
               name="q" 
               placeholder="Rechercher une plante..." 
               class="flex-1 px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-[#2c5e3b] focus:border-[#2c5e3b] outline-none">
        
        <select name="famille" class="px-4 py-3 border-2 border-gray-200 rounded-lg focus:ring-2 focus:ring-[#2c5e3b] outline-none">
            <option value="">Toutes les familles</option>
        </select>
        
        <button type="submit" class="bg-[#2c5e3b] text-white px-6 py-3 rounded-lg font-bold hover:bg-[#1e4028] transition">
            Rechercher
        </button>
    </form>
</div>
