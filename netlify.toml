[build]
  command = "jekyll build"
  publish = "_site"

[build.environment]
  JEKYLL_ENV = "production"

# Redirections pour les langues
[[redirects]]
  from = "/"
  to = "/fr/"
  status = 302

[[redirects]]
  from = "/index.html"
  to = "/fr/"
  status = 302

# Gestion des erreurs 404
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers de sécurité
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
