[build]
  command = "echo 'No build required'"
  publish = "."

[build.environment]
  HUGO_VERSION = "0.80.0"

[redirects]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
